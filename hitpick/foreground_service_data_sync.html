<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>안타 히트픽 FOREGROUND_SERVICE_DATA_SYNC 사용 시연</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --surface: #0d1828;
      --surface-soft: #132236;
      --text: #f4f7fb;
      --muted: #aab8cc;
      --line: #26384f;
      --primary: #8dbbff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      line-height: 1.6;
      word-break: keep-all;
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 40px auto;
      padding: 32px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.36);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 5vw, 38px);
      line-height: 1.25;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 16px;
    }

    .video-wrap {
      overflow: hidden;
      background: #000;
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    video {
      display: block;
      width: 100%;
      max-height: 78vh;
      background: #000;
    }

    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-soft);
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }

    .button-link:hover {
      text-decoration: none;
      border-color: var(--primary);
    }
  </style>
</head>
<body>
  <main>
    <div class="video-wrap">
      <video controls preload="metadata" playsinline>
        <source src="./foreground_service_data_sync.mp4" type="video/mp4">
        브라우저에서 동영상 재생을 지원하지 않습니다.
      </video>
    </div>
  </main>
</body>
</html>
